name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eol-check:
    runs-on: ubuntu-latest

    steps:
      - uses: sindrel/endoflife-github-action@v1
        with:
          product: node
          version: 20
          fail_on_eol: 'true'

  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
