name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:
  eol-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check Node.js EOL
        run: |
          eol=$(curl -sf https://endoflife.date/api/nodejs/$NODE_VERSION.json | jq -r '.eol')
          today=$(date +%Y-%m-%d)
          echo "Node.js $NODE_VERSION EOL: $eol / Today: $today"
          if [[ "$today" > "$eol" ]]; then
            echo "::error::Node.js $NODE_VERSION has reached EOL ($eol)"
            exit 1
          fi

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
